<!DOCTYPE html >
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบยืม-คืนหนังสือ</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body onload="init()">
    <div class="container">
    <nav class="navbar">
        <div class="nav-left">
            <div class="nav-brand">Library Shop</div>
            <ul class="nav-links">
                <li><a href="index.html">จัดการหนังสือ</a></li>
                <li><a href="Borrow-back.html" class="active">ยืม-คืน หนังสือ</a></li>
            </ul>
        </div>
        <div class="nav-right">
            <button class="btn-logout" onclick="logout()">ออกจากระบบ</button>
        </div>
    </nav>
    <div id="notificationBox"></div>
        <h2> ระบบทำรายการ ยืม - คืน</h2>
        <div class="action-container">
            <div class="action-card">
                <h3 style="color: var(--primary);"> ยืมหนังสือ</h3>
                <form id="borrowForm" onsubmit="return false;">
                    <div class="input-group">
                        <label>รหัสหนังสือ (ID)</label>
                        <input type="number" id="borrow_book_id" placeholder="เช่น 1, 2, 3..." required>
                    </div>
                    <div class="input-group">
                        <label>Member ID</label>
                        <input type="text" id="Member_id" placeholder="รหัสสมาชิก..." required>
                    </div>
                    <button type="button" class="btn-primary full-width" onclick="borrowBook()">บันทึกการยืม</button>
                </form>
            </div>
            <div class="action-card">
                <h3 style="color: #10B981;">คืนหนังสือ</h3>
                <form id="returnForm" onsubmit="return false;">
                    <div class="input-group">
                        <label>รหัสหนังสือ (ID)</label>
                        <input type="number" id="return_book_id" placeholder="ระบุ ID หนังสือที่นำมาคืน..." required>
                    </div>
                    <div class="input-group">
                        <label>Member ID</label>
                        <input type="text" id="Member_id_return" placeholder="รหัสสมาชิก..." required>
                    </div>
                    <button type="button" class="btn-success" onclick="returnBook()">บันทึกการคืน</button>
                </form>
            </div>
        </div>
    </div> 
        <div class="action-card dashboard-card">
    <div class="header-bar">
        <h3 style="color: #F59E0B; margin: 0;">รายการหนังสือที่ยังไม่คืน (ค้างส่ง)</h3>
        
        <div style="display: flex; gap: 10px; align-items: center;">
            <input type="text" id="searchMemberId" placeholder="ค้นหา Member ID..." 
                    oninput="filterActiveBorrows()" 
                    style="width: 160px; padding: 8px 12px; margin-bottom: 0; font-size: 14px;">
            
            <button class="btn-secondary" onclick="loadActiveBorrowers()">รีเฟรช</button>
        </div>
    </div>
    
    <div id="active_display" class="table-container">
        </div>
</div>
    </div>

    <script>

        function showMessage(htmlMessage, isSuccess) {
            const notifBox = document.getElementById('notificationBox');
            notifBox.style.display = 'block';
            notifBox.innerHTML = htmlMessage;
            
            if(isSuccess) {
                notifBox.className = 'notify-success';
            } else {
                notifBox.className = 'notify-error';
            }

            
            if(isSuccess) {
                setTimeout(() => { notifBox.style.display = 'none'; }, 5000);
            }
        }

        async function init() {
            loadActiveBorrowers()
        }

        async function borrowBook() {
            const book_id = document.getElementById('borrow_book_id').value;
            const Member_id = document.getElementById('Member_id').value;

            if (!book_id || !Member_id ){
                showMessage('กรุณากรอกข้อมูลให้ครบถ้วน', false);
                return;
            }

            try{
                const response = await fetch('/api/borrow', {
                    method:'POST',
                    headers: {'Content-Type' : 'application/json'},
                    body: JSON.stringify({
                        book_id:book_id,
                        Member_id:Member_id,
                    })
                });

                const result = await response.json();

                if(response.ok) {
                    showMessage(`<strong>${result.message}</strong><br>หนังสือ: ${result.book_title}<br>กำหนดคืน: ${result.returnDate}`, true);
                    document.getElementById('borrowForm').reset();
                    window.addEventListener('DOMContentLoaded', loadActiveBorrowers);
                }else{
                    showMessage(`ผิดพลาด: ${result.message}`, false);
                }
            }catch(err){
                console.error(err);
                showMessage('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้', false);
            }
        }

        async function returnBook() {
            const book_id = document.getElementById('return_book_id').value;
            const Member_id = document.getElementById('Member_id_return').value;

            if(!book_id || !Member_id ){
                showMessage('กรุณากรอกข้อมูลให้ครบถ้วนเพื่อทำการคืนหนังสือ', false);
                return;
            }

            try{
                const response = await fetch ('/api/returnBook',{
                    method:"POST",
                    headers: {'Content-Type' : 'application/json'},
                    body: JSON.stringify({
                        book_id: book_id,
                        Member_id: Member_id
                    })
                });

                const result = await response.json();

                if(response.ok) {
                    if(result.overDueday > 0){
                        showMessage(`<strong>${result.message}</strong><br>ผู้ยืม: ${result.borrower_name}<br>เลยกำหนด: ${result.overDueday} วัน<br>ค่าปรับ: ${result.fine} บาท`, false);
                        window.addEventListener('DOMContentLoaded', loadActiveBorrowers);
                    }else{
                        showMessage(`<strong>${result.message}</strong><br>ขอบคุณที่ส่งคืนตรงเวลาครับ`, true);
                        window.addEventListener('DOMContentLoaded', loadActiveBorrowers);
                    }
                }else {
                    
                    showMessage(`ผิดพลาด: ${result.message}`, false);
                }
            }catch(err){
                console.error('err');
                showMessage('เชื่อมต่อเซิร์ฟเวอร์ไม่ได้', false);
            }
        }

       // ฟังก์ชันโหลดรายชื่อลูกค้าที่ยังไม่คืนหนังสือ
        let allActiveData = []; // ตัวแปรสำหรับเก็บข้อมูลทั้งหมดเพื่อใช้ค้นหา

        // 1. ฟังก์ชันดึงข้อมูลจาก Server
        async function loadActiveBorrowers() {
            const displayDiv = document.getElementById('active_display');
            displayDiv.innerHTML = '<p class="text-center text-gray message-box">กำลังโหลดข้อมูล...</p>';

            try {
                const response = await fetch('/api/active-borrows');
                const data = await response.json();

                if (!response.ok) {
                    displayDiv.innerHTML = '<p class="text-center text-danger message-box">โหลดข้อมูลล้มเหลว</p>';
                    return;
                }

                allActiveData = data; // เก็บข้อมูลลงตัวแปรกลาง
                renderActiveTable(allActiveData); // สั่งให้วาดตาราง

            } catch (err) {
                console.error(err);
                displayDiv.innerHTML = '<p class="text-center text-danger message-box">เชื่อมต่อเซิร์ฟเวอร์ไม่ได้</p>';
            }
        }

        // 2. ฟังก์ชันสำหรับกรองข้อมูล 
        function filterActiveBorrows() {
            const searchTerm = document.getElementById('searchMemberId').value.trim();
            
            if (!searchTerm) {
                renderActiveTable(allActiveData);
                return;
            }

            // กรองข้อมูลเฉพาะ Member ID ที่ตรงกับคำค้นหา
            const filtered = allActiveData.filter(item => 
                item.member_id.toString().includes(searchTerm)
            );

            renderActiveTable(filtered);
        }

        // 3. ฟังก์ชันสำหรับวาดตาราง HTML 
        function renderActiveTable(data) {
            const displayDiv = document.getElementById('active_display');

            if (data.length === 0) {
                displayDiv.innerHTML = '<p class="text-center text-success message-box">ไม่พบข้อมูลรายการที่ค้นหา</p>';
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr class="table-header-gray">
                            <th>รหัสยืม</th>
                            <th>ID หนังสือ</th>
                            <th>ผู้ยืม (ติดต่อ)</th>
                            <th>หนังสือที่ยืม</th>
                            <th>ที่อยู่จัดส่ง</th>
                            <th>วันที่ยืม</th>
                            <th>กำหนดคืน</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            data.forEach(item => {
                const borrowDate = new Date(item.borrow_date).toLocaleDateString('th-TH');
                const dueDateObj = new Date(item.due_date);
                const dueDate = dueDateObj.toLocaleDateString('th-TH');
                
                const today = new Date();
                today.setHours(0,0,0,0);
                dueDateObj.setHours(0,0,0,0);
                
                const isOverdue = today > dueDateObj;
                const dueDateClass = isOverdue ? 'text-danger' : '';
                const overdueBadge = isOverdue ? '<br><span class="overdue-badge">เลยกำหนด</span>' : '';

                html += `
                    <tr>
                        <td class="text-gray">#${item.borrow_id}</td>
                        <td><span class="badge-gray">B-${item.book_id}</span></td>
                        <td class="text-left">
                            <div style="margin-bottom: 4px;">
                                <span class="badge-blue">M-${item.member_id}</span>
                                <strong>${item.member_name}</strong>
                            </div>
                            <span class="text-contact">📞 ${item.member_contact}</span>
                        </td>
                        <td class="text-left" style="font-weight: 500;">${item.book_title}</td>
                        <td class="text-left">
                            <div class="truncate-text" title="${item.member_address}">
                                ${item.member_address || '-'}
                            </div>
                        </td>
                        <td>${borrowDate}</td>
                        <td class="${dueDateClass}">${dueDate} ${overdueBadge}</td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            displayDiv.innerHTML = html;
        }

        window.addEventListener('DOMContentLoaded', loadActiveBorrowers);
    </script>
</html>
