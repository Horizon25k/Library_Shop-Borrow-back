<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เข้าสู่ระบบ</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Prompt', sans-serif; background-color: #F3F4F6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background-color: #FFF; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 350px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0 20px; border: 1px solid #E5E7EB; border-radius: 8px; box-sizing: border-box; font-family: inherit; }
        button { width: 100%; padding: 12px; background-color: #4F46E5; color: white; border: none; border-radius: 8px; font-weight: 500; cursor: pointer; font-size: 16px; }
        button:hover { background-color: #4338CA; }
    </style>
</head>
<body>

    <div class="login-box">
        <h2>ระบบจัดการหนังสือ</h2>
        <form id="loginForm" onsubmit="return false;">
            <input type="text" id="username" placeholder="Username" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="button" onclick="login()">เข้าสู่ระบบ</button>
        </form>
    </div>

    <script>
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', result.token); // เก็บกุญแจ
                    window.location.href = '/index.html'; // ส่งไปหน้าหลัก
                } else {
                    alert(result.message); // แจ้งเตือนถ้ารหัสผิด
                }
            } catch (err) {
                alert("เชื่อมต่อเซิร์ฟเวอร์ไม่ได้");
            }
        }
    </script>
</body>
</html>
