<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เข้าสู่ระบบ</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/login.css">
</head>
<body>

    <div class="login-box">
        <h2>ระบบจัดการหนังสือ</h2>
        <form id="loginForm" onsubmit="return false;">
            <input type="text" id="username" placeholder="Username (admin)" required>
            <input type="password" id="password" placeholder="Password (123456)" required>
            <button type="button" onclick="login()">เข้าสู่ระบบ</button>
        </form>
    </div>

    <script>
        async function login() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;

            try {
                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const result = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', result.token); 
                    window.location.href = '/index.html'; 
                } else {
                    alert(result.message); 
                }
            } catch (err) {
                alert("เชื่อมต่อเซิร์ฟเวอร์ไม่ได้");
            }
        }
    </script>
</body>
</html>
