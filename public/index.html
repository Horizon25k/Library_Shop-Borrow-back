<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ระบบจัดการหนังสือออนไลน์</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body onload="init()">
    <div class="container">
        <nav class="navbar">
        <div class="nav-left">
            <div class="nav-brand"> Library Shop</div>
            <ul class="nav-links">
                <li><a href="index.html" class="active">จัดการหนังสือ</a></li>
                <li><a href="Borrow-back.html">ยืม-คืน หนังสือ</a></li> </ul>
        </div>
        <div class="nav-right">
            <span class="admin-name"> สวัสดี, เจ้าหน้าที่</span>
            <button class="btn-logout" onclick="logout()">ออกจากระบบ</button>
        </div>
    </nav>
        <form id="libraryForm" class="add-library-form" onsubmit="return false;">
            <input type="text" id="title" placeholder="ชื่อหนังสือ">
            <input type="text" id="author" placeholder="ผู้แต่ง">
            <input type="number" id="published_year" placeholder="ปีที่พิมพ์">
            <select id="status_id">
                <option value="">--กำลังโหลดสถานะ--</option>
            </select>
            <select id="category_id">
                <option value="">--กำลังโหลดหมวดหมู่--</option>
            </select>
            <input type="file" id="images">
            <button type="button" class="btn-primary" onclick="savelibrary()">บันทึกข้อมูล</button>
        </form>

        <div id="display"></div>
    </div>

    <div id="libraryModal" class="modal">
        <div class="modal-content">
            <h3>แก้ไขหนังสือ</h3>
            <input type="hidden" id="edit_id">
            <p><span>ชื่อหนังสือ:</span> <input type="text" id="edit_title" placeholder="ชื่อหนังสือ"></p>
            <p><span>ชื่อผู้แต่ง:</span> <input type="text" id="edit_author" placeholder="ชื่อผู้แต่ง"></p>
            <p><span>ปีที่พิมพ์:</span> <input type="number" id="edit_published_year" placeholder="ปีที่พิมพ์"></p>
            <p><span>สถานะ:</span> <select id="edit_status_id"></select></p>
            <p><span>หมวดหมู่:</span> <select id="edit_category_id"></select></p>
            <p>
                <span>รูปภาพปัจจุบัน:</span><br>
                <img id="current_image" src="" width='120px' style="border-radius: 8px; border: 1px solid #eee; margin-top: 8px;">
            </p>
            <p><span>อัปโหลดรูปภาพใหม่:</span> <input type="file" id="edit_images"></p>
            
            <div class="modal-actions">
                <div class="modal-actions-left">
                    <button type="button" class="btn-danger" onclick="deleteLibrary()">ลบหนังสือ</button>
                </div>
                <button class="btn-secondary" onclick="closeModal()">ยกเลิก</button>
                <button class="btn-primary" onclick="saveData()">บันทึกการแก้ไขข้อมูล</button>
            </div>
        </div>
    </div>

    <script>

        if (!localStorage.getItem('token')) {
            window.location.href = '/login.html';
        }

        function logout() {
            localStorage.removeItem('token');
            window.location.href = '/login.html';
        }        

        // 1. ฟังก์ชันเริ่มต้นทำงานตอนโหลดหน้าเว็บ
        async function init() {
            await loadStatus();     
            await loadCategories(); 
            await loadlibrary();
        }

        // 2. ดึงข้อมูลหมวดหมู่มาใส่ใน Dropdown
        async function loadCategories() {
            try {
                const res = await fetch('/api/categories');
                const categories = await res.json();
                let options = `<option value="">เลือกหมวดหมู่</option>`;
                categories.forEach(c => {
                    options += `<option value="${c.id}">${c.name}</option>`;
                });
                document.getElementById('category_id').innerHTML = options;
                document.getElementById('edit_category_id').innerHTML = options;
            } catch (err) { console.error("Error:", err); }
        }

        // 3. ดึงข้อมูลสถานะมาใส่ใน Dropdown
        async function loadStatus() {
            try {
                const res = await fetch('/api/statuses');
                const statuses = await res.json();
                let options = `<option value="">เลือกสถานะ</option>`;
                statuses.forEach(s => {
                    options += `<option value="${s.id}">${s.name}</option>`;
                });
                document.getElementById('status_id').innerHTML = options;
                document.getElementById('edit_status_id').innerHTML = options;
            } catch (err) { console.error("Error:", err); }
        }

        // 4. ดึงข้อมูลหนังสือมาสร้างเป็นตาราง HTML
        async function loadlibrary() {
            try {
                const response = await fetch('/api/libraryshop');
                const books = await response.json();
                
                let html = `
                    <table>
                        <tr style="background-color:#eee;">
                            <th>Image</th><th>ID</th><th>Name</th><th>Author</th>
                            <th>Year</th><th>Status</th><th>Category</th><th>Manage</th>
                        </tr>
                `;
                books.forEach(b => {
                    html += `
                        <tr>
                            <td><img src="${b.cover_image}" width="60" height="60"></td>
                            <td style="color: #6B7280;">B${b.id}</td>
                            <td>${b.title}</td>
                            <td>${b.author}</td>
                            <td>${b.published_year}</td>
                            <td>${b.status_name || '-'}</td>
                            <td>${b.categories || '-'}</td>
                            <td><a href="#" class="edit-link" onclick="openModal(${b.id}); return false;">แก้ไข</a></td>
                        </tr>
                    `;
                });
                html += '</table>';
                document.getElementById('display').innerHTML = html;
            } catch (err) {
                document.getElementById('display').innerHTML = '<p style="color:red;">เกิดข้อผิดพลาดในการโหลดข้อมูล</p>';
            }
        }
        
        // 5. บันทึกเพิ่มหนังสือใหม่
        async function savelibrary() {
            const title = document.getElementById('title').value;
            const author = document.getElementById('author').value;
            const published_year = document.getElementById('published_year').value;
            const status_id = document.getElementById('status_id').value;
            const category_id = document.getElementById('category_id').value;
            const images = document.getElementById('images');

            if(!title || !author || !published_year || !status_id || !category_id) {
                alert('กรุณากรอกข้อมูลให้ครบถ้วน');
                return;
            }

            // ใช้ FormData เพราะมีการส่งไฟล์รูปภาพ
            const formData = new FormData();
            formData.append('title', title);
            formData.append('author', author);
            formData.append('published_year', published_year);
            formData.append('status_id', status_id);
            formData.append('category_id', category_id);
            if(images.files[0]) formData.append('image', images.files[0]);

            try {
                const response = await fetch('/api/libraryshop', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                alert(result.message);
                
                document.getElementById('libraryForm').reset(); // ล้างฟอร์ม
                await loadlibrary(); 
            } catch(err) { console.error("Save Error:", err); }
        }

        // 6. เปิด Modal และดึงข้อมูลหนังสือเล่มนั้นมาแสดง
        async function openModal(id) {
            document.getElementById('libraryModal').style.display = 'block';
            try {
                const res = await fetch(`/api/libraryshop/${id}`);
                const b = await res.json();
                
                // นำข้อมูลที่ได้ไปแปะในช่อง Input
                document.getElementById('edit_id').value = b.id;
                document.getElementById('edit_title').value = b.title;
                document.getElementById('edit_author').value = b.author;
                document.getElementById('edit_published_year').value = b.published_year;
                document.getElementById('edit_status_id').value = b.status_id;
                document.getElementById('edit_category_id').value = b.category_id;
                document.getElementById('current_image').src = b.cover_image;
            } catch(error){
                alert('ไม่สามารถโหลดข้อมูลหนังสือได้');
            }
        }

        // 7. ปิด Modal
        function closeModal() {
            document.getElementById('libraryModal').style.display = 'none';
        }

        // ทำให้กดคลิกพื้นที่นอก Modal แล้วปิดหน้าต่างได้
        window.onclick = function(event) {
            if (event.target == document.getElementById('libraryModal')) closeModal();
        }

        // 8. บันทึกข้อมูลที่ถูกแก้ไข (อัปเดต)
        async function saveData() {
            const id = document.getElementById('edit_id').value;
            const formData = new FormData();

            formData.append('title', document.getElementById('edit_title').value);
            formData.append('author', document.getElementById('edit_author').value);
            formData.append('published_year', document.getElementById('edit_published_year').value);
            formData.append('status_id', document.getElementById('edit_status_id').value);
            formData.append('category_id', document.getElementById('edit_category_id').value);
            
            const fileInput = document.getElementById('edit_images');
            if(fileInput.files[0]) formData.append('images', fileInput.files[0]);

            try {
                const response = await fetch(`/api/libraryshop/${id}`, {
                    method: 'PUT',
                    body: formData
                });
                if(response.ok) {
                    alert('บันทึกข้อมูลสำเร็จ!');
                    closeModal();
                    loadlibrary(); // รีโหลดตาราง
                }
            } catch(err) { console.error("Update Error:", err); }
        }

        // 9. ลบหนังสือ
        async function deleteLibrary() {
            const id = document.getElementById('edit_id').value;
            if(confirm('คุณต้องการลบหนังสือเล่มนี้หรือไม่?')) {
                try {
                    const response = await fetch(`/api/books/${id}`, { method: 'DELETE' });
                    if (response.ok) {
                        alert('ลบข้อมูลสำเร็จ');
                        closeModal();
                        await loadlibrary(); 
                    }
                } catch(err) { console.error('Error:', err); }
            }
        }
    </script>
</body>
</html>
